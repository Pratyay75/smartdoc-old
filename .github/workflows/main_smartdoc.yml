name: Build and deploy Python app to Azure Web App - smartdoc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install dependencies to verify build (optional but recommended)
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Upload project (exclude virtual env & unnecessary files)
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !venv/
            !antenv/
            !__pycache__/
            !.git/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_18E3D584C9494CE68157E1F093B50037 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FF26495D5AEC4CB586C975C74A89D032 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F5C3881500674ADEB88EDADAB6D6B302 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: smartdoc
          slot-name: Production